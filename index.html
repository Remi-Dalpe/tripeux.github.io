<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="icon" type="image/png" href="assets/img/logo-tripeux.jpg" />

    <link href="https://fonts.googleapis.com/css?family=Poppins:300,400,500,600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <title>Les TRIpeux de l'est</title>

    <script defer src="script.js"></script>
  </head>
  <body>
    <header class="header">
      <nav class="nav">
        <img src="assets/img/logo-tripeux.jpg" alt="TRIpeux logo" class="nav__logo" id="logo" />
        <ul class="nav__links">
          <li class="nav__item">
            <a class="nav__link" href="https://www.facebook.com/triathlonpat" target="_blank">Notre Facebook ↗</a>
          </li>
          <li class="nav__item">
            <a class="nav__link" href="#section--2">Calendrier</a>
          </li>
          <li class="nav__item">
            <a class="nav__link" href="#section--3">Entraineurs</a>
          </li>
          <li class="nav__item">
            <a class="nav__link nav__link--btn btn--show-modal" href="#">Sign-in / Sign-up</a>
          </li>
        </ul>
      </nav>

      <div class="header__title">
        <h1>
          Club <span class="highlight-green">Multi-Sports</span>
          <br />
          <span class="highlight-blue">Les TRIpeux de l'est</span>
        </h1>
        <h4>Entrainements tout les mercredis! 🏃🏊🚵</h4>
        <button class="btn--text btn--scroll-to">Découverte &DownArrow;</button>
        <img
          loading="lazy"
          src="assets/img/cover-facebook-lazy.jpg"
          data-src="assets/img/cover-facebook.jpg"
          class="header__img lazy-img"
          alt="Minimalist bank items"
        />
      </div>
    </header>

    <footer class="footer">
      <ul class="footer__nav">
        <li class="footer__item">
          <a class="footer__link" href="#">À propos</a>
        </li>
        <li class="footer__item">
          <a class="footer__link" href="#">Forfaits</a>
        </li>
        <li class="footer__item">
          <a class="footer__link" href="#">Conditions d'utilisation</a>
        </li>
        <li class="footer__item">
          <a class="footer__link" href="#">Confidentialité</a>
        </li>
        <li class="footer__item">
          <a class="footer__link" href="#">Devenir coach</a>
        </li>
        <li class="footer__item">
          <a class="footer__link" href="#">Nous contacter</a>
        </li>
      </ul>
      <img src="assets/img/logo-tripeux.jpg" alt="Logo" class="footer__logo" />
      <p class="footer__copyright">
        &copy;
        <a class="footer__link twitter-link" target="_blank" href="">Les TRIpeux</a>.
      </p>
    </footer>

    <div class="overlay hidden"></div>
  </body>
</html>
