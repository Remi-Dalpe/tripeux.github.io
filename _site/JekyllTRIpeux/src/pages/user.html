<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="icon" type="image/png" href="/JekyllDemo/src/assets/img/logo-tripeux.jpg" alt="Logo" class="logo" />
    <title>Les TRIpeux de l'est</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/JekyllDemo/src/styles/style.css" />

    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet" />
    <script defer src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

    <script defer src="/JekyllDemo/assets/scripts/modals.js"></script>
    <script defer src="/JekyllDemo/assets/scripts/slider.js"></script>
    <script defer src="/JekyllDemo/assets/scripts/index.js"></script>
    <script defer src="/JekyllDemo/assets/scripts/perf.js"></script>
    <script defer src="/JekyllDemo/assets/scripts/cal.js"></script>
  </head>
  <body>
    <header class="header header__user">
      {% include nav.html %}

      <div class="header__content header__content-user">
        <div class="section__title">
          <h2 class="section__description">Bienvenue!</h2>
          <h3 class="section__header" id="userDisplayName">User</h3>
        </div>
      </div>
    </header>

    <section class="section" id="section--1">
      <div class="section__title">
        <h2 class="section__description">Calendar title description</h2>
        <h3 class="section__header">Calendar title header</h3>
      </div>
      <div class="calendar">
        <div class="calendar__controls">
          <div class="calendar__control-range">
            <input type="date" id="goDate" />
            <button id="goToDate">Go</button>
          </div>
          <div class="calendar__control-events">
            <input type="text" id="eventTitle" placeholder="Event Title" />
            <input type="datetime-local" id="eventDate" />
            <button id="createEvent">Create Event</button>
            <div class="calendar__control-events-recuring">
              <input type="number" id="count" placeholder="Amount of times" />
              <button id="createRecurringEvent">Create Weekly Event</button>
            </div>
          </div>
          <input type="text" id="eventSearch" placeholder="Search events..." />
        </div>
        <div id="calendar"></div>
      </div>
    </section>

    {% include footer.html %} {% include modals.html %}
  </body>
</html>
