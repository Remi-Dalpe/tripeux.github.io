name: Les TRIpeux static page

on:
  # Trigger this workflow on push to the main branch
  push:
    branches: ['main']
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Step to checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step to upload the build folder
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # path to your build output

      # Step to deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
